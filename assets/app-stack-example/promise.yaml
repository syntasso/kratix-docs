apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  creationTimestamp: null
  labels:
    kratix.io/promise-version: v0.1.0
  name: app-stack
spec:
  requiredPromises:
    - name: s3
      version: v0.1.0
    - name: postgresql
      version: v1.0.0-beta.3
    - name: runtime
      version: v1.0.0
  destinationSelectors:
    - matchLabels:
        environment: platform
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      creationTimestamp: null
      name: appstacks.example.kratix.io
    spec:
      group: example.kratix.io
      names:
        kind: AppStack
        plural: appstacks
        singular: appstack
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  image:
                    type: string
                  database:
                    properties:
                      driver:
                        type: string
                        enum: [ postgresql ]
                    type: object
                  bucket:
                    properties:
                      name:
                        type: string
                      public:
                        type: boolean
                    type: object
                type: object
            type: object
        served: true
        storage: true
  workflows:
    resource:
      configure:
        - apiVersion: platform.kratix.io/v1alpha1
          kind: Pipeline
          metadata:
            name: instance-configure
          spec:
            containers:
              - image: ghcr.io/syntasso/kratix-docs/app-stack-example-pipeline:v0.1.0
                name: deploy-resources
