apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  creationTimestamp: null
  labels:
    kratix.io/promise-version: v0.1.0
  name: s3
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: buckets.example.kratix.io
    spec:
      group: example.kratix.io
      names:
        kind: bucket
        plural: buckets
        singular: bucket
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                default: {}
                properties:
                  bucketName:
                    description: (Optional, Forces new resource) The name of the bucket.
                      If omitted, Terraform will assign a random, unique name.
                    type: string
                  public:
                    default: false
                    description: |
                      Should the bucket be publicly accessible
                    type: boolean
                type: object
            type: object
        served: true
        storage: true
  workflows:
    config: {}
    promise:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: dependencies
        spec:
          containers:
          - image: ghcr.io/syntasso/kratix-examples/kratix-workshop/s3-promise-pipeline:v0.1.0
            name: configure-deps
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: instance-configure
        spec:
          containers:
          - env:
            - name: MODULE_SOURCE
              value: terraform-aws-modules/s3-bucket/aws
            - name: MODULE_REGISTRY_VERSION
              value: 3.7.0
            - name: MODULE_OUTPUT_NAMES
              value: s3_bucket_arn,s3_bucket_id,s3_bucket_arn,s3_bucket_bucket_domain_name
            image: ghcr.io/syntasso/kratix-cli/terraform-generate:v0.6.0
            name: terraform-generate
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: output-writer
        spec:
          rbac:
            permissions:
            - apiGroups:
                - ""
              resources:
                - secrets
              verbs:
                - get
              resourceNamespace: "*"
            - apiGroups:
                - platform.kratix.io
              resources:
                - workplacements
              verbs:
                - list
                - get
            - apiGroups:
                - platform.kratix.io
              resources:
                - destinations
              verbs:
                - list
              resourceNamespace: "*"
          containers:
          - image: ghcr.io/syntasso/ske-tfstate-finder:v0.7.3
            name: fetch-output
            env:
            - name: TIMEOUT
              value: "30m"
