<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a5568"/>
    </marker>
    <style>
      .box { fill: #f7fafc; stroke: #2d3748; stroke-width: 2; rx: 8; }
      .box-accent { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 2; rx: 8; }
      .box-worker { fill: #f0fff4; stroke: #276749; stroke-width: 2; rx: 8; }
      .label { font-size: 14px; fill: #1a202c; font-weight: 600; }
      .sublabel { font-size: 12px; fill: #4a5568; }
      .step { font-size: 11px; fill: #2b6cb0; font-weight: 700; }
      .arrow { stroke: #2b6cb0; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .note { font-size: 12px; fill: #2b6cb0; font-weight: 600; }
    </style>
  </defs>
  <text x="360" y="28" text-anchor="middle" class="label" font-size="16">First claim: the shared namespace is created</text>

  <rect x="40" y="60" width="140" height="56" class="box"/>
  <text x="110" y="84" text-anchor="middle" class="label">Application</text>
  <text x="110" y="102" text-anchor="middle" class="sublabel">app-one</text>

  <rect x="240" y="60" width="160" height="56" class="box-accent"/>
  <text x="320" y="84" text-anchor="middle" class="label">NamespaceClaim</text>
  <text x="320" y="102" text-anchor="middle" class="sublabel">1 live claim</text>

  <rect x="460" y="60" width="180" height="56" class="box-accent"/>
  <text x="550" y="84" text-anchor="middle" class="label">Namespace request</text>
  <text x="550" y="102" text-anchor="middle" class="sublabel">created (one)</text>

  <rect x="460" y="280" width="180" height="56" class="box-worker"/>
  <text x="550" y="304" text-anchor="middle" class="label">Namespace</text>
  <text x="550" y="322" text-anchor="middle" class="sublabel">on worker cluster</text>

  <line x1="180" y1="88" x2="238" y2="88" class="arrow"/>
  <text x="209" y="78" text-anchor="middle" class="step">1</text>

  <line x1="400" y1="88" x2="458" y2="88" class="arrow"/>
  <text x="429" y="78" text-anchor="middle" class="step">2</text>

  <line x1="550" y1="116" x2="550" y2="278" class="arrow"/>
  <text x="562" y="200" text-anchor="middle" class="step">3</text>

  <text x="40" y="160" class="sublabel">1. The Application Promise configure workflow outputs a NamespaceClaim.</text>
  <text x="40" y="180" class="sublabel">2. The NamespaceClaim workflow creates the provider Namespace request.</text>
  <text x="40" y="200" class="sublabel">3. The Namespace Promise schedules the real Namespace to the worker.</text>

  <rect x="40" y="230" width="360" height="90" class="box" fill="#fffaf0" stroke="#c05621"/>
  <text x="220" y="255" text-anchor="middle" class="label">team-mobile</text>
  <text x="220" y="275" text-anchor="middle" class="sublabel">shared namespace name</text>
  <text x="220" y="300" text-anchor="middle" class="sublabel">created once</text>

  <text x="360" y="380" text-anchor="middle" class="note">Live claim count: 1</text>
</svg>
