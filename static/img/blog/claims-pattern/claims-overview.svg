<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a5568"/>
    </marker>
    <style>
      .box { fill: #f7fafc; stroke: #2d3748; stroke-width: 2; rx: 8; }
      .box-claim { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 2; rx: 8; }
      .box-provider { fill: #faf5ff; stroke: #6b46c1; stroke-width: 2; rx: 8; }
      .box-worker { fill: #f0fff4; stroke: #276749; stroke-width: 2; rx: 8; }
      .label { font-size: 13px; fill: #1a202c; font-weight: 600; }
      .sublabel { font-size: 11px; fill: #4a5568; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="360" y="24" text-anchor="middle" class="label" font-size="15">Two roles in the claims model</text>
  <rect x="20" y="50" width="130" height="100" class="box"/>
  <text x="85" y="78" text-anchor="middle" class="label">Application</text>
  <text x="85" y="96" text-anchor="middle" class="label">Promise</text>
  <text x="85" y="118" text-anchor="middle" class="sublabel">per consumer</text>
  <rect x="190" y="50" width="130" height="100" class="box-claim"/>
  <text x="255" y="78" text-anchor="middle" class="label">NamespaceClaim</text>
  <text x="255" y="100" text-anchor="middle" class="sublabel">work-owned</text>
  <text x="255" y="118" text-anchor="middle" class="sublabel">many per namespace</text>
  <rect x="360" y="50" width="150" height="100" class="box-provider"/>
  <text x="435" y="78" text-anchor="middle" class="label">Namespace</text>
  <text x="435" y="96" text-anchor="middle" class="label">request</text>
  <text x="435" y="118" text-anchor="middle" class="sublabel">not work-owned</text>
  <text x="435" y="136" text-anchor="middle" class="sublabel">one per namespace</text>
  <rect x="550" y="50" width="150" height="100" class="box-worker"/>
  <text x="625" y="88" text-anchor="middle" class="label">Namespace</text>
  <text x="625" y="110" text-anchor="middle" class="sublabel">on worker cluster</text>
  <line x1="150" y1="100" x2="188" y2="100" class="arrow"/>
  <line x1="320" y1="100" x2="358" y2="100" class="arrow"/>
  <line x1="510" y1="100" x2="548" y2="100" class="arrow"/>
  <text x="85" y="175" text-anchor="middle" class="sublabel">dies with app</text>
  <text x="255" y="175" text-anchor="middle" class="sublabel">dies with app</text>
  <text x="435" y="175" text-anchor="middle" class="sublabel">survives single claim delete</text>
</svg>
