<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a5568"/>
    </marker>
    <style>
      .box { fill: #f7fafc; stroke: #2d3748; stroke-width: 2; rx: 8; }
      .box-gone { fill: #fff5f5; stroke: #c53030; stroke-width: 2; stroke-dasharray: 6 4; rx: 8; }
      .box-accent { fill: #ebf8ff; stroke: #2b6cb0; stroke-width: 2; rx: 8; }
      .box-worker { fill: #f0fff4; stroke: #276749; stroke-width: 2; rx: 8; }
      .label { font-size: 14px; fill: #1a202c; font-weight: 600; }
      .sublabel { font-size: 12px; fill: #4a5568; }
      .gone { font-size: 12px; fill: #c53030; font-weight: 600; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="360" y="28" text-anchor="middle" class="label" font-size="16">Delete one application: namespace stays</text>
  <rect x="30" y="60" width="120" height="50" class="box-gone"/>
  <text x="90" y="82" text-anchor="middle" class="label">app-one</text>
  <text x="90" y="100" text-anchor="middle" class="gone">deleted</text>
  <rect x="30" y="140" width="120" height="50" class="box"/>
  <text x="90" y="168" text-anchor="middle" class="label">app-two</text>
  <rect x="200" y="60" width="150" height="50" class="box-gone"/>
  <text x="275" y="82" text-anchor="middle" class="label">claim gone</text>
  <text x="275" y="100" text-anchor="middle" class="gone">with app-one</text>
  <rect x="200" y="140" width="150" height="50" class="box-accent"/>
  <text x="275" y="163" text-anchor="middle" class="label">claim (app-two)</text>
  <text x="275" y="181" text-anchor="middle" class="sublabel">still live</text>
  <rect x="420" y="100" width="170" height="56" class="box-accent"/>
  <text x="505" y="124" text-anchor="middle" class="label">Namespace request</text>
  <text x="505" y="142" text-anchor="middle" class="sublabel">kept (count &gt; 0)</text>
  <rect x="420" y="280" width="170" height="56" class="box-worker"/>
  <text x="505" y="304" text-anchor="middle" class="label">Namespace</text>
  <text x="505" y="322" text-anchor="middle" class="sublabel">still on worker</text>
  <line x1="150" y1="165" x2="198" y2="165" class="arrow"/>
  <line x1="350" y1="165" x2="418" y2="128" class="arrow"/>
  <line x1="505" y1="156" x2="505" y2="278" class="arrow"/>
  <text x="40" y="230" class="sublabel">app-one and its NamespaceClaim are removed.</text>
  <text x="40" y="250" class="sublabel">The delete workflow counts live claims for team-platform: one remains.</text>
  <text x="40" y="270" class="sublabel">The provider request and the Namespace on the worker are left alone.</text>
  <text x="360" y="370" text-anchor="middle" class="sublabel">This is the case the naive Compound Promise pattern gets wrong.</text>
</svg>
