<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4a5568"/>
    </marker>
    <style>
      .box-gone { fill: #fff5f5; stroke: #c53030; stroke-width: 2; stroke-dasharray: 6 4; rx: 8; }
      .label { font-size: 14px; fill: #1a202c; font-weight: 600; }
      .sublabel { font-size: 12px; fill: #4a5568; }
      .gone { font-size: 12px; fill: #c53030; font-weight: 600; }
      .arrow { stroke: #c53030; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="360" y="28" text-anchor="middle" class="label" font-size="16">Delete the last application: namespace is removed</text>
  <rect x="30" y="80" width="120" height="50" class="box-gone"/>
  <text x="90" y="102" text-anchor="middle" class="label">app-two</text>
  <text x="90" y="120" text-anchor="middle" class="gone">deleted</text>
  <rect x="200" y="80" width="150" height="50" class="box-gone"/>
  <text x="275" y="102" text-anchor="middle" class="label">last claim</text>
  <text x="275" y="120" text-anchor="middle" class="gone">gone</text>
  <rect x="420" y="60" width="170" height="56" class="box-gone"/>
  <text x="505" y="84" text-anchor="middle" class="label">Namespace request</text>
  <text x="505" y="102" text-anchor="middle" class="gone">deleted</text>
  <rect x="420" y="240" width="170" height="56" class="box-gone"/>
  <text x="505" y="264" text-anchor="middle" class="label">Namespace</text>
  <text x="505" y="282" text-anchor="middle" class="gone">pruned from worker</text>
  <line x1="350" y1="105" x2="418" y2="88" class="arrow"/>
  <line x1="505" y1="116" x2="505" y2="238" class="arrow"/>
  <text x="40" y="180" class="sublabel">The final NamespaceClaim is deleted.</text>
  <text x="40" y="200" class="sublabel">The delete workflow counts live claims for team-platform: zero.</text>
  <text x="40" y="220" class="sublabel">The provider Namespace request is removed. The Namespace Promise tears down the</text>
  <text x="40" y="240" class="sublabel">Namespace on the worker. Nobody left to complain.</text>
  <text x="360" y="360" text-anchor="middle" class="sublabel">Live claim count: 0: shared resource cleaned up</text>
</svg>
